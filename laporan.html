<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisis Kehadiran Semester</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { bg-color: #121212; background: linear-gradient(135deg, #121212 0%, #1a1a2e 100%); color: #e0e0e0; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
        .card-custom { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; color: #fff; }
        .form-select { background-color: #222; border: 1px solid #444; color: #fff; }
        .table-custom { color: #e0e0e0; }
        .table-custom th { background-color: rgba(255, 255, 255, 0.1) !important; color: #fff !important; border-color: #444; }
        .table-custom td { border-color: #333; background: transparent !important; }
        .danger-alert { background-color: rgba(220, 53, 69, 0.2) !important; color: #ff6b6b !important; }
    </style>
</head>
<body>

    <div class="container py-5">
        <h2 class="text-center mb-5 fw-bold"><i class="bi bi-pie-chart text-info"></i> Analitik Kehadiran Real-Time Semester</h2>
        
        <div class="card-custom p-4 shadow mb-4">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Tapis Mengikut Kelas</label>
                    <select id="laporanKelas" class="form-select" onchange="paparLaporan()">
                        <!-- Diposkan secara dinamik -->
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tapis Mengikut Minggu</label>
                    <select id="laporanMinggu" class="form-select" onchange="paparLaporan()">
                        <option value="semua">Keseluruhan Semester</option>
                        <!-- Minggu 1, Minggu 2 dll dimasukkan secara dinamik -->
                    </select>
                </div>
            </div>
        </div>

        <div class="card-custom p-4 shadow">
            <h4><i class="bi bi-table"></i> Rumusan Prestasi Kehadiran</h4>
            <p class="small text-muted">Petunjuk: Pelajar yang berada dalam zon merah (< 80%) memerlukan perhatian sewajarnya.</p>
            <div class="table-responsive mt-3">
                <table class="table table-custom table-hover align-middle text-center">
                    <thead>
                        <tr>
                            <th>Nama Pelajar</th>
                            <th>Hari Hadir</th>
                            <th>Total Hari Sesi</th>
                            <th>Peratusan Semasa (%)</th>
                        </tr>
                    </thead>
                    <tbody id="jadualLaporan">
                        <!-- Data dikira secara dinamik -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="text-center mt-5">
            <a href="index.html" class="btn btn-primary px-4 py-2 rounded-pill"><i class="bi bi-arrow-left"></i> Kembali ke Menu Penandaan</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
